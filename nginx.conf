server {
    listen       80;
    server_name  _;

    # 不暴露 Nginx 版本号
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # ─── 安全响应头 ──────────────────────────────────────────────

    # Content-Security-Policy：防止 XSS / 代码注入
    # unsafe-inline 用于 Element Plus / Quill 内联样式；unsafe-eval 用于 Vue 模板编译（dev 模式需要，prod 可移除）
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';";

    # HSTS：强制浏览器使用 HTTPS（仅在启用 SSL 后生效）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 禁止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;

    # 控制 Referer 信息泄露
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 限制浏览器特性使用
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── 压缩 ────────────────────────────────────────────────────

    # Gzip（通用回退）
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml text/xml;
    gzip_vary on;

    # Brotli 静态文件（需 nginx 编译 ngx_brotli 模块，Dockerfile 使用 fholzer/nginx-brotli 镜像提供）
    brotli_static on;

    # ─── 路由 / 缓存 ─────────────────────────────────────────────

    # SPA history 模式 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite 构建产物带 hash，可安全设置 1 年强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html 禁止缓存，确保发布后立即生效
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
